name: auto-rebase

on:
  push:
    branches:
      - main

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebase open PRs on main
        uses: peter-evans/rebase@v4
        with:
          base: main
          exclude-labels: no-rebase,do-not-rebase